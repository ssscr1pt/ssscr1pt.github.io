<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Валентинка 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-hearts">
        <div class="heart-bg"></div>
        <div class="heart-bg"></div>
        <div class="heart-bg"></div>
        <div class="heart-bg"></div>
        <div class="heart-bg"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-content">
                <h1 class="title">your soul is mine <3 </h1>
                
                <div class="heart-main">💕</div>

                <div class="album-cover">
                    <div class="cover-image" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwEjOcyYRX_eRBSti-VnNI8ny7AhhaJ8406A&s');"></div>
                    <div class="track-label">
                        <div class="artist-name">Aquakey</div>
                        <div class="track-name">Почему?</div>
                    </div>
                </div>
                
                <p class="message">
                    <br>
                    ты вновь уходишь я не знаю почему<br>
                    я так люблю тебя, не знаю почему<br>
                    <span class="special">i <3 u </span>
                </p>

                <div class="flowers">
                    <span class="flower">🌹</span>
                    <span class="flower">🌷</span>
                    <span class="flower">🌺</span>
                    <span class="flower">🌸</span>
                    <span class="flower">💐</span>
                </div>

            <div class="floating-hearts">
                <div class="float-heart" style="animation-delay: 0s;">💕</div>
                <div class="float-heart" style="animation-delay: 1s;">💗</div>
                <div class="float-heart" style="animation-delay: 2s;">💖</div>
                <div class="float-heart" style="animation-delay: 3s;">💝</div>
                <div class="float-heart" style="animation-delay: 4s;">💓</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>14 февраля 2026 💌</p>
        <p style="font-size: 12px; opacity: 0.7;">Создано с любовью ❤️</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
